<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1>회원가입</h1>
        <div class="input-area">
            <input type="text" id="useridInput" placeholder="아이디를 입력하세요">
            <input type="password" id="passwordInput" placeholder="비밀번호를 입력하세요">
            <input type="text" id="nameInput" placeholder="이름을 입력하세요">
            <input type="text" id="emailInput" placeholder="이메일을 입력하세요">
            <button id="regBtn">회원가입</button>
        </div>
    </div>
    <script src="./register.mjs"></script>
</body>

</html>
